<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Generated Report - Station Maintenance</title>
    <style>
        body {
            font-family: Segoe UI, Roboto, sans-serif;
            background: linear-gradient(180deg, #eef2f7 0%, #ffffff 100%);
            margin: 0;
            padding: 24px
        }

        .container {
            width: 100%;
            max-width: none;
            margin: 0 auto;
            background: transparent;
            padding: 0;
            box-shadow: none;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 16px;
            color: #0b3a66;
            text-align: center;
            font-weight: 700;
        }

        .meta-table-4col {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 18px;
        }

        .meta-table-4col td {
            border: 1px solid black;
            padding: 8px 10px;
        }

        .meta-table-4col .label {
            font-weight: 600;
            width: 16%;
            background: none !important;
        }

        .module-section {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 25px 0 !important;
        }

        .module-title {
            font-size: 18px;
            font-weight: 700;
            color: black;
            padding: 0;
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }

        .obs-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid black;
        }

        .obs-table th {
            border: 2px solid black;
            padding: 8px;
            font-size: 15px;
            background: none !important;
            color: black;
            font-weight: 600;
        }

        .obs-table td {
            border: 1.5px solid black;
            padding: 8px;
            font-size: 16px;
            color: black;
        }

        /* Thicker black borders for meta and summary tables */
        .meta-table-4col td, .summary-table td, .summary-table th {
            border: 2px solid black !important;
        }

        .status-block-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .status-block-table td {
            border: 2px solid black;
            padding: 12px;
            vertical-align: middle;
            font-size: 16px;
            font-weight: 600;
        }

        .status-block-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .status-block-table td {
            border: 2px solid black;
            padding: 12px;
            vertical-align: middle;
            font-size: 16px;
            font-weight: 600;
        }

        .img-thumb {
            max-width: 150px;
            max-height: 120px;
            border: 1px solid #333;
            cursor: pointer;
            margin: 2px;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .btn {
            padding: 10px 16px;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            background: #007bff;
            font-size: 14px;
            font-weight: 600;
        }

        .btn.print {
            background: #16a34a;
        }

        .note {
            color: #64748b;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #666;
            font-size: 16px;
        }

        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #imageModal > div {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        #imageModal img {
            max-width: 95vw;
            max-height: 90vh;
            border-radius: 4px;
        }

        #imageModal span {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 32px;
            cursor: pointer;
            color: #333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <h1>Station Maintenance Report (Generated)</h1>
        <div id="metaArea"></div>
        <div id="obsArea"></div>
        <div class="controls">
            <button class="btn" id="backBtn">Back</button>
            <button class="btn print" id="createPdfBtn">Create PDF</button>
            <button id="viewReportsBtn" class="btn" style="display:none;background:#6c5ce7;margin-left:10px;" disabled>
                View Reports
            </button>
        </div>
        <div class="note">If data is missing, go back to the create page and Save the station details first.</div>
    </div>

    <script>
        (function () {
            const zone = sessionStorage.getItem('zone') || '';
            const station = sessionStorage.getItem('station') || '';
            const date = sessionStorage.getItem('date') || '';

            const metaArea = document.getElementById('metaArea');
            const obsArea = document.getElementById('obsArea');
            const createBtn = document.getElementById('createPdfBtn');
            const viewBtn = document.getElementById('viewReportsBtn');
            let fullObservations = []; // maintain full data for summaries
            let startedAtDate = '';
            let updatedAtDate = '';

            function escapeHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

            function renderMeta(info, started, updated) {
                // Multi-row header: Zone, Station, Date, Started, Updated
                metaArea.innerHTML = `
                    <table class="meta-table-4col">
                        <tr>
                            <td class="label">Zone</td>
                            <td>${escapeHtml(info.zone || '--')}</td>
                            <td class="label">Station</td>
                            <td>${escapeHtml(info.station || '--')}</td>
                            <td class="label">Date</td>
                            <td>${escapeHtml(info.date || '--')}</td>
                        </tr>
                        <tr>
                            <td class="label">Report Started</td>
                            <td>${escapeHtml(started || '--')}</td>
                            <td class="label">Last Updated</td>
                            <td colspan="3">${escapeHtml(updated || '--')}</td>
                        </tr>
                    </table>
                `;
            }

            function renderObservations(observations) {
                if (!observations || observations.length === 0) {
                    obsArea.innerHTML = '<div class="empty">No observations found for this station entry.</div>';
                    return;
                }

                const CLEAN_NAME = {
                    'quarterly_check': 'SCHEDULE CHECK – QUARTERLY',
                    'daily_monthly': 'MAINTENANCE SCHEDULE – DAILY & MONTHLY',
                    'quarterly_half': 'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'
                };

                const groups = {};
                observations.forEach(obs => {
                    const raw = (obs.module || '').toString().trim().toLowerCase();
                    const moduleName = CLEAN_NAME[raw] || raw.toUpperCase();
                    if (!groups[moduleName]) groups[moduleName] = [];
                    groups[moduleName].push(obs);
                });

                // ----- Summary: Total Points & Closed Points (similar to RIU) -----
                const totalPoints = fullObservations.length;
                let closedPoints = 0;
                fullObservations.forEach(o => {
                    const hasObserved = (o.observed_value || '').toString().trim() !== '';
                    const hasRemarks = (o.remarks || '').toString().trim() !== '';
                    if (hasObserved || hasRemarks) closedPoints++;
                });
                const openPoints = Math.max(0, totalPoints - closedPoints);
                const statusText = openPoints === 0 && totalPoints > 0 ? 'Completed' : 'Not Completed';

                // Update heading with status like RIU page
                const h1 = document.querySelector('h1');
                if (h1) {
                    h1.textContent = `Station Maintenance Report (Generated) — ${statusText}`;
                }

                // Build per-module open/closed status table (like RIU)
                const moduleStatuses = [];
                const moduleOrder = [
                    'SCHEDULE CHECK – QUARTERLY',
                    'MAINTENANCE SCHEDULE – DAILY & MONTHLY',
                    'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'
                ];

                moduleOrder.forEach(name => {
                    const rows = groups[name] || [];
                    if (!rows.length) {
                        moduleStatuses.push({
                            name,
                            status: 'Not yet started'
                        });
                        return;
                    }
                    let moduleClosed = 0;
                    rows.forEach(o => {
                        const hasObs = (o.observed_value || '').toString().trim() !== '';
                        const hasRem = (o.remarks || '').toString().trim() !== '';
                        if (hasObs || hasRem) moduleClosed++;
                    });
                    const moduleOpen = Math.max(0, rows.length - moduleClosed);
                    let status;
                    if (moduleOpen === 0) status = 'Completed';
                    else status = `Open points: ${moduleOpen}`;
                    moduleStatuses.push({ name, status });
                });

                // Append overall + per-module summary block under meta table
                let summaryHtml = `
                    <div class="module-section">
                        <div class="module-title">Summary</div>
                        <table class="meta-table-4col">
                            <tr>
                                <td class="label">Total Points</td>
                                <td>${totalPoints}</td>
                                <td class="label">Closed Points</td>
                                <td>${closedPoints}</td>
                            </tr>
                        </table>
                        ${openPoints > 0 ? `<div style="margin-top:8px;"><em>${openPoints} point(s) still open overall.</em></div>` : ''}
                        <div style="margin-top:12px;">
                            <table class="meta-table-4col">
                                <tr>
                                    <td class="label">Module</td>
                                    <td colspan="3"><strong>Status</strong></td>
                                </tr>`;

                moduleStatuses.forEach(ms => {
                    summaryHtml += `
                                <tr>
                                    <td class="label">${escapeHtml(ms.name)}</td>
                                    <td colspan="3">${escapeHtml(ms.status)}</td>
                                </tr>`;
                });

                summaryHtml += `
                            </table>
                        </div>
                    </div>`;

                metaArea.innerHTML += summaryHtml;

                let tableHtml = '';
                const displayOrder = ['SCHEDULE CHECK – QUARTERLY', 'MAINTENANCE SCHEDULE – DAILY & MONTHLY', 'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'];

                displayOrder.forEach(name => {
                    if (!groups[name]) return;

                    // Determine headers based on module name
                    let headers, cellMapping;
                    if (name === 'SCHEDULE CHECK – QUARTERLY') {
                        headers = ['S.No', 'Details of Equipment', 'Name/Number', 'Date of Commissioning', 'Required Value', 'Observed Value', 'Remarks', 'Images'];
                        cellMapping = {
                            s_no: 's_no',
                            col1: 'details',
                            col2: 'name_number',
                            col3: 'date_commission',
                            col4: 'required_value',
                            col5: 'observed_value',
                            col6: 'remarks'
                        };
                    } else {
                        // For daily_monthly and quarterly_half
                        headers = ['S.No', 'Location', 'Maintenance Task Description', 'Action taken/Range of Voltage levels', 'Frequency', 'Equipment condition', 'Remarks', 'Images'];
                        cellMapping = {
                            s_no: 's_no',
                            col1: 'name_number',  // Location
                            col2: 'details',      // Maintenance Task Description
                            col3: 'required_value', // Action taken/Range
                            col4: 'date_commission', // Frequency
                            col5: 'observed_value', // Equipment condition
                            col6: 'remarks'
                        };
                    }

                    // Pre-filter to check if this module has ANY valid entries to display
                    const moduleNameRaw = groups[name][0]?.module || name;
                    const validObs = fullObservations.filter(obs => obs.module === moduleNameRaw).filter(obs => {
                        const hasObs = (obs.observed_value || '').toString().trim() !== '';
                        const hasRem = (obs.remarks || '').toString().trim() !== '';
                        const hasName = (obs.name_number || '').toString().trim() !== '';

                        if (!hasObs && !hasRem) {
                            const modKey = (obs.module || name || '').toLowerCase();
                            const isCheckAll = modKey === 'quarterly_check';
                            if (!isCheckAll || !hasName) return false;
                        }
                        return true;
                    });

                    // Skip the module completely if no valid rows exist!
                    if (validObs.length === 0) return;

                    tableHtml += `<div class="module-section">
                        <div class="module-title">${escapeHtml(name)}</div>
                        <div style="overflow-x:auto;">
                            <table class="obs-table">
                                <thead>
                                    <tr>
                                        ${headers.map(h => `<th style="width:${h === 'S.No' ? '5%' : h === 'Images' ? '18%' : '13%'}">${escapeHtml(h)}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>`;

                    validObs.forEach(obs => {
                        let images = [];
                        if (Array.isArray(obs.image_paths)) {
                            images = obs.image_paths;
                        } else if (obs.image_path && (obs.image_path.startsWith('[') || obs.image_path.startsWith('{'))) {
                            try {
                                images = JSON.parse(obs.image_path);
                            } catch(e) {
                                images = [obs.image_path];
                            }
                        } else if (obs.image_path) {
                            images = [obs.image_path];
                        }
                        images = images.filter(Boolean);

                        const imgHtml = images.length
                            ? images.map(p => `<img src="${escapeHtml(p)}" class="img-thumb" onclick="openImageModal('${escapeHtml(p)}')">`).join('')
                            : 'N/A';

                        tableHtml += `<tr>
                            <td>${escapeHtml(obs[cellMapping.s_no] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col1] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col2] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col3] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col4] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col5] || '')}</td>
                            <td>${escapeHtml(obs[cellMapping.col6] || '')}</td>
                            <td style="text-align:center">${imgHtml}</td>
                        </tr>`;
                    });

                    tableHtml += `</tbody></table></div></div>`;
                });

                obsArea.innerHTML = tableHtml + `
                    <div id="imageModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:10000;">
                        <div style="position:relative;background:white;padding:14px;border-radius:8px;">
                            <span onclick="closeImageModal()" style="position:absolute;top:8px;right:12px;cursor:pointer;font-size:24px;">×</span>
                            <img id="modalImage" src="" style="max-width:95vw;max-height:90vh;">
                        </div>
                    </div>`;
            }

            function openImageModal(imagePath) {
                document.getElementById('modalImage').src = imagePath;
                document.getElementById('imageModal').style.display = 'flex';
            }

            function closeImageModal() {
                document.getElementById('imageModal').style.display = 'none';
            }
            window.openImageModal = openImageModal;
            window.closeImageModal = closeImageModal;

            function showError(msg) {
                metaArea.innerHTML = `<div class="empty">${escapeHtml(msg)}</div>`;
                obsArea.innerHTML = '';
            }

            if (!zone || !station || !date) {
                showError('Station metadata is missing from session. Please go back to the create page and Save the station details first.');
                createBtn.disabled = true;
            } else {
                fetch('get_observations.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zone: zone, station: station, date: date })
                })
                    .then(r => r.json())
                    .then(json => {
                        startedAtDate = json.started_at || '';
                        updatedAtDate = json.updated_at || '';

                        if (json.station_info) renderMeta(json.station_info, startedAtDate, updatedAtDate);
                        else renderMeta({ zone, station, date }, startedAtDate, updatedAtDate);
                        fullObservations = json.observations || [];
                        renderObservations(fullObservations);
                    })
                    .catch(err => {
                        console.error(err);
                        showError('Failed to load data. Check network and server.');
                        createBtn.disabled = true;
                    });
            }

            document.getElementById('backBtn').addEventListener('click', function () { history.back(); });
            createBtn.addEventListener('click', createPDF);
            if (viewBtn) {
                viewBtn.addEventListener('click', function () {
                    window.location.href = 'viewReports.php';
                });
            }

            async function createPDF() {
                if (!zone || !station || !date) {
                    alert('Station metadata missing. Please go back and save station details.');
                    return;
                }

                createBtn.disabled = true;
                createBtn.innerText = 'Creating...';

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: 'pt', format: 'a4' });
                const contentWidth = 520;
                const startX = 40;

                // Collect observations (used for PDF body and to determine completion status)
                const obsRows = document.querySelectorAll('.obs-table tbody tr');
                const observations = [];
                obsRows.forEach(row => {
                    const cells = row.children;
                    const imgElements = cells[7]?.querySelectorAll('img') || [];
                    observations.push({
                        s_no: cells[0]?.innerText || '',
                        details: cells[1]?.innerText || '',
                        name_number: cells[2]?.innerText || '',
                        date_commission: cells[3]?.innerText || '',
                        required_value: cells[4]?.innerText || '',
                        observed_value: cells[5]?.innerText || '',
                        remarks: cells[6]?.innerText || '',
                        image_paths: Array.from(imgElements).map(img => img.src)
                    });
                });

                // Work out completion status for file name (similar criteria as summary)
                let closedPoints = 0;
                fullObservations.forEach(o => {
                    const hasObs = (o.observed_value || '').toString().trim() !== '';
                    const hasRem = (o.remarks || '').toString().trim() !== '';
                    if (hasObs || hasRem) closedPoints++;
                });
                const totalPoints = fullObservations.length;
                const openPoints = Math.max(0, totalPoints - closedPoints);
                const statusForName = (openPoints === 0 && totalPoints > 0) ? 'Completed' : 'NotCompleted';

                // Page 1 - Header
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(18);
                doc.text('Station Maintenance Report', doc.internal.pageSize.getWidth() / 2, 30, { align: 'center' });

                // Station Info Table
                doc.autoTable({
                    startY: 50,
                    head: [['Zone', 'Station', 'Date', 'Report Started', 'Last Updated']],
                    body: [[zone || '--', station || '--', date || '--', startedAtDate || '--', updatedAtDate || '--']],
                    theme: 'grid',
                    styles: { fontSize: 11, cellPadding: 8, lineColor: [0,0,0], lineWidth: 1.5 },
                    headStyles: { fillColor: [30,60,120], textColor: 255, fontStyle: 'bold', fontSize: 11, lineColor: [0,0,0], lineWidth: 1.5 },
                    margin: { left: startX, right: startX }
                });

                let currentY = doc.lastAutoTable.finalY + 25;

                // === Module Summary Table ===
                const CLEAN_NAME_PDF = {
                    'quarterly_check': 'SCHEDULE CHECK – QUARTERLY',
                    'daily_monthly': 'MAINTENANCE SCHEDULE – DAILY & MONTHLY',
                    'quarterly_half': 'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'
                };
                const expectedModulesPdf = ['SCHEDULE CHECK – QUARTERLY', 'MAINTENANCE SCHEDULE – DAILY & MONTHLY', 'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'];
                const summaryRowsPdf = [];

                expectedModulesPdf.forEach(moduleName => {
                    const rows = fullObservations.filter(o => {
                        const raw = (o.module || '').toString().trim().toLowerCase();
                        return (CLEAN_NAME_PDF[raw] === moduleName) || (raw.toUpperCase() === moduleName.toUpperCase());
                    });

                    if (rows.length === 0) {
                        summaryRowsPdf.push([moduleName, 'Not yet started']);
                        return;
                    }

                    const openPoints = rows.filter(o => {
                        const hasObs = (o.observed_value || '').toString().trim() !== '';
                        const hasRem = (o.remarks || '').toString().trim() !== '';
                        return !hasObs && !hasRem;
                    });

                    if (openPoints.length === 0) {
                        summaryRowsPdf.push([moduleName, 'Completed']);
                    } else {
                        summaryRowsPdf.push([moduleName, `Open points: ${openPoints.length}`]);
                    }
                });

                doc.autoTable({
                    startY: currentY,
                    head: [['Module', 'Status']],
                    body: summaryRowsPdf,
                    theme: 'grid',
                    styles: { fontSize: 12, cellPadding: 8, lineColor: [0,0,0], lineWidth: 1.5 },
                    headStyles: { fillColor: [241, 245, 249], textColor: [11, 58, 102], fontStyle: 'bold', fontSize: 12, lineColor: [0,0,0], lineWidth: 1.5 },
                    columnStyles: { 0: { cellWidth: 200 }, 1: { cellWidth: 320 } },
                    margin: { left: startX, right: startX }
                });

                currentY = doc.lastAutoTable.finalY + 15;

                // === 3-Column Status Table for PDF (True Checkboxes) ===
                const isCompleted = (openPoints === 0 && totalPoints > 0);
                const h = 40;
                
                // Reset Line Width and Color
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(1.5);
                
                // Col 1: Maintenance Status
                doc.setFillColor(240, 240, 240);
                doc.rect(startX, currentY, 200, h, 'FD'); // Fill Gray & Draw Border
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(13);
                doc.setTextColor(0, 0, 0);
                doc.text('MAINTENANCE STATUS', startX + 15, currentY + 25);
                
                // Col 2: Completed
                doc.rect(startX + 200, currentY, 160, h, 'S'); // Draw Border
                doc.setTextColor(isCompleted ? 46 : 100, isCompleted ? 125 : 100, isCompleted ? 50 : 100);
                doc.rect(startX + 230, currentY + 14, 12, 12); // Real Checkbox square
                if (isCompleted) {
                    doc.setDrawColor(46, 125, 50); // Green tick
                    doc.setLineWidth(2);
                    doc.line(startX + 233, currentY + 20, startX + 235, currentY + 23); // tick down
                    doc.line(startX + 235, currentY + 23, startX + 241, currentY + 15); // tick up
                    doc.setDrawColor(0, 0, 0);
                    doc.setLineWidth(1.5);
                }
                doc.text('Completed', startX + 255, currentY + 25);
                
                // Col 3: Not Completed
                doc.rect(startX + 360, currentY, 160, h, 'S'); // Draw Border
                doc.setTextColor(!isCompleted ? 198 : 100, !isCompleted ? 40 : 100, !isCompleted ? 40 : 100);
                doc.rect(startX + 375, currentY + 14, 12, 12); // Real Checkbox square
                if (!isCompleted) {
                    doc.setDrawColor(198, 40, 40); // Red cross
                    doc.setLineWidth(2);
                    doc.line(startX + 377, currentY + 16, startX + 385, currentY + 24); // cross stroke 1
                    doc.line(startX + 385, currentY + 16, startX + 377, currentY + 24); // cross stroke 2
                    doc.setDrawColor(0, 0, 0);
                    doc.setLineWidth(1.5);
                }
                doc.text('Not Completed', startX + 395, currentY + 25);

                currentY += h + 25;

                // Render each module table exactly as on screen
                document.querySelectorAll('.module-section').forEach(section => {
                    const moduleTitle = section.querySelector('.module-title')?.innerText || '';
                    const table = section.querySelector('.obs-table');
                    if (!table) return;

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(15);
                    doc.setTextColor(0, 0, 0); // Reset to Black
                    doc.text(moduleTitle, startX, currentY);
                    currentY += 15;

                    const headerRow = table.querySelector('thead tr');
                    const headers = Array.from(headerRow?.cells || []).map(th => th.innerText.trim());

                    const tableBody = [];
                    const CLEAN_NAME_PDF = {
                        'quarterly_check': 'SCHEDULE CHECK – QUARTERLY',
                        'daily_monthly': 'MAINTENANCE SCHEDULE – DAILY & MONTHLY',
                        'quarterly_half': 'MAINTENANCE SCHEDULE – QUARTERLY & HALF YEARLY'
                    };

                    fullObservations.forEach(obs => {
                        const raw = (obs.module || '').toString().trim().toLowerCase();
                        const moduleName = CLEAN_NAME_PDF[raw] || raw.toUpperCase();
                        if (moduleName !== moduleTitle) return;

                        // REFINED FILTER FOR PDF
                        const hasObs = (obs.observed_value || '').toString().trim() !== '';
                        const hasRem = (obs.remarks || '').toString().trim() !== '';
                        const hasName = (obs.name_number || '').toString().trim() !== '';
                        if (!hasObs && !hasRem) {
                            const modKey = (obs.module || raw || '').toLowerCase();
                            const isCheckAll = modKey === 'quarterly_check';
                            if (!isCheckAll || !hasName) return;
                        }

                        let cm = {};
                        if (moduleName === 'SCHEDULE CHECK – QUARTERLY') {
                            cm = { s_no:'s_no', c1:'details', c2:'name_number', c3:'date_commission', c4:'required_value', c5:'observed_value', c6:'remarks' };
                        } else {
                            cm = { s_no:'s_no', c1:'name_number', c2:'details', c3:'required_value', c4:'date_commission', c5:'observed_value', c6:'remarks' };
                        }

                        // Fetch b64 images from the visible HTML table
                        const b64List = [];
                        const matchingHtmlRow = Array.from(table.querySelectorAll('tbody tr')).find(tr => tr.cells[0]?.innerText.trim() === String(obs[cm.s_no]));
                        if (matchingHtmlRow) {
                            const imgs = matchingHtmlRow.querySelectorAll('img');
                            imgs.forEach(img => {
                                try {
                                    if (img.src && (img.complete || img.naturalWidth > 0)) {
                                        const canvas = document.createElement('canvas');
                                        canvas.width = img.naturalWidth || img.width;
                                        canvas.height = img.naturalHeight || img.height;
                                        const ctx = canvas.getContext('2d');
                                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                        b64List.push(canvas.toDataURL('image/jpeg', 0.8));
                                    }
                                } catch (e) {}
                            });
                        }

                        tableBody.push([
                            obs[cm.s_no] || '',
                            obs[cm.c1] || '',
                            obs[cm.c2] || '',
                            obs[cm.c3] || '',
                            obs[cm.c4] || '',
                            obs[cm.c5] || '',
                            obs[cm.c6] || '',
                            b64List
                        ]);
                    });

                    doc.autoTable({
                        startY: currentY,
                        head: [headers],
                        body: tableBody,
                        theme: 'grid',
                        styles: { fontSize: 9, cellPadding: 3, lineColor: [0,0,0], lineWidth: 1.2, valign: 'middle' },
                        headStyles: { 
                            fillColor: [30,60,120], 
                            textColor: 255, 
                            fontStyle: 'bold', 
                            fontSize: 8.5, 
                            lineColor: [0,0,0], 
                            lineWidth: 1.2,
                            halign: 'center' 
                        },
                        margin: { left: startX, right: startX },
                        tableWidth: contentWidth,
                        columnStyles: {
                            0: { cellWidth: 25 }, // S.No
                            1: { cellWidth: 'auto' },
                            2: { cellWidth: 'auto' },
                            3: { cellWidth: 70 }, // Date of Commissioning
                            4: { cellWidth: 'auto' },
                            5: { cellWidth: 'auto' },
                            6: { cellWidth: 'auto' },
                            7: { cellWidth: 110 } // Images (increased)
                        },
                        didParseCell: function(data) {
                            if (data.column.index === 7 && data.section === 'body') {
                                data.cell.text = ''; // Clear raw paths/text
                                const b64s = data.cell.raw;
                                if (Array.isArray(b64s) && b64s.length > 0) {
                                    const requiredHeight = (b64s.length * 75) + 12;
                                    if (requiredHeight > data.row.height) {
                                        data.row.height = requiredHeight;
                                    }
                                }
                            }
                        },
                        didDrawCell: function(data) {
                            if (data.column.index === 7 && data.section === 'body' && Array.isArray(data.cell.raw)) {
                                const b64s = data.cell.raw;
                                b64s.forEach((b64, idx) => {
                                    const imgX = data.cell.x + 5;
                                    const imgY = data.cell.y + 6 + (idx * 75);
                                    try {
                                        // Draw at 100x70 pts
                                        doc.addImage(b64, 'JPEG', imgX, imgY, 100, 70);
                                    } catch(e) {}
                                });
                            }
                        }
                    });

                    currentY = doc.lastAutoTable.finalY + 20;

                    if (currentY > doc.internal.pageSize.getHeight() - 50) {
                        doc.addPage();
                        currentY = 50;
                    }
                });




                // Footer
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.text('Generated on: ' + new Date().toLocaleDateString('en-IN') + ' at ' + new Date().toLocaleTimeString('en-IN'),
                    doc.internal.pageSize.getWidth() / 2, doc.internal.pageSize.getHeight() - 20, { align: 'center' });

                // Create a server-friendly file name with status and timestamp
                function formatTs(d) {
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
                }
                const nowTs = formatTs(new Date());
                const safeZone = (zone || '--').toString().replace(/\s+/g, '_');
                const safeStation = (station || '--').toString().replace(/\s+/g, '_');
                const safeDate = (date || '--').toString().replace(/\//g, '-');
                const reportName = `STATION_${safeZone}_${safeStation}_${safeDate}_${statusForName}_${nowTs}.pdf`;

                try {
                    // Export PDF as base64 and send to backend for storage & versioning
                    const dataUri = doc.output('datauristring');
                    const base64 = dataUri.split(',')[1];

                    const payload = {
                        zone,
                        station,
                        date,
                        pdf_base64: base64,
                        report_name: reportName
                    };

                    const resp = await fetch('generate_pdf.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const json = await resp.json();
                    if (!json || !json.success) {
                        throw new Error(json && json.message ? json.message : 'Server error while saving PDF');
                    }

                    createBtn.disabled = false;
                    createBtn.innerText = 'Created';
                    alert('PDF Created & Saved Successfully.');

                    // Enable "View Reports" button now that at least one report exists
                    if (viewBtn) {
                        viewBtn.style.display = 'inline-block';
                        viewBtn.disabled = false;
                    }
                } catch (err) {
                    console.error(err);
                    createBtn.disabled = false;
                    createBtn.innerText = 'Create PDF';
                    alert('Failed to save PDF to server.');
                }
            }
        })();
    </script>
</body>
</html>
